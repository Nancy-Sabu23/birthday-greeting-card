<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Happy Birthday!</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
</head>
<body>

  <div id="confetti-container"></div>

  <div class="page">
    <div class="card">

      <span class="deco-circle dc1"></span>
      <span class="deco-circle dc2"></span>
      <span class="deco-circle dc3"></span>

      <div class="dots-row">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div class="cake">🎂</div>

      <h1 class="card-title">Happy Birthday!</h1>

      <!-- Change "To You" to the person's name! -->
      <p class="card-name">To You</p>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-star">✦</span>
        <div class="divider-line"></div>
      </div>

      <div class="stars">
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
        <span class="star">★</span>
      </div>

      <!-- Change this message to anything you like! -->
      <p class="card-msg">
        Wishing you a day filled with joy, laughter,<br/>
        and all the things that make you smile.<br/>
        May this year bring you everything<br/>
        your heart desires. You deserve it all!
      </p>

      <div class="balloons">
        <div class="balloon b1"></div>
        <div class="balloon b2"></div>
        <div class="balloon b3"></div>
        <div class="balloon b4"></div>
        <div class="balloon b5"></div>
      </div>

      <!-- Change the sender name here! -->
      <p class="card-footer">Made with love by <strong>Nancy</strong> 🧡</p>

    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
